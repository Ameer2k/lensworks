<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to LensWorks</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="text-slate-900 font-sans h-screen flex overflow-hidden bg-white">

    <!-- Left Side: Dynamic Visuals (Hidden on Mobile) -->
    <div class="hidden lg:flex lg:w-1/2 relative bg-slate-900">
        <!-- Dynamic Background Image -->
        <div id="auth-bg" class="absolute inset-0 bg-cover bg-center bg-crossfade" style="background-image: url('https://images.unsplash.com/photo-1537151608828-ea2b11777ee8?q=80&w=2578&auto=format&fit=crop');"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/30 to-black/10"></div>
        
        <div class="relative z-10 flex flex-col justify-between p-12 w-full">
            <!-- Logo -->
            <a href="index.html" class="flex items-center gap-2 text-white hover:opacity-80 transition">
                <i data-lucide="camera" class="w-8 h-8"></i>
                <span class="text-2xl font-bold tracking-tight">LensWorks</span>
            </a>

            <!-- Dynamic Text Content -->
            <div id="auth-quote" class="max-w-md">
                <h2 class="text-4xl font-bold text-white mb-4 leading-tight">Find the perfect lens for your story.</h2>
                <p class="text-gray-300 text-lg">Join thousands of clients discovering top-tier photographers and studios for their most important moments.</p>
            </div>
        </div>
    </div>

    <!-- Right Side: Authentication Forms -->
    <div class="w-full lg:w-1/2 flex flex-col items-center justify-center p-8 sm:p-12 md:p-24 overflow-y-auto relative">
        
        <!-- Mobile Logo -->
        <a href="index.html" class="lg:hidden absolute top-8 left-8 flex items-center gap-2 text-slate-900">
            <i data-lucide="camera" class="w-6 h-6"></i>
            <span class="text-xl font-bold tracking-tight">LensWorks</span>
        </a>

        <div class="w-full max-w-md space-y-8 relative pt-12 lg:pt-0">
            
            <!-- Header -->
            <div class="text-center">
                <h1 id="form-title" class="text-3xl font-bold tracking-tight text-slate-900">Welcome Back</h1>
                <p id="form-subtitle" class="text-gray-500 mt-2">Log in to your account to continue.</p>
            </div>

            <!-- Role Selector (Only visible during Signup) -->
            <div id="role-selector" class="hidden">
                <p class="text-sm font-semibold text-gray-700 mb-3 text-center uppercase tracking-wider">I want to...</p>
                <div class="grid grid-cols-2 gap-4">
                    <button id="role-client" class="role-btn border-2 border-slate-900 bg-slate-50 rounded-xl p-4 flex flex-col items-center text-center transition">
                        <i data-lucide="search" class="w-6 h-6 text-slate-900 mb-2"></i>
                        <span class="font-bold text-slate-900 text-sm">Hire a Pro</span>
                    </button>
                    <button id="role-vendor" class="role-btn border-2 border-gray-200 hover:border-gray-300 rounded-xl p-4 flex flex-col items-center text-center transition opacity-60 hover:opacity-100">
                        <i data-lucide="aperture" class="w-6 h-6 text-gray-500 mb-2"></i>
                        <span class="font-bold text-gray-600 text-sm">Offer Services</span>
                    </button>
                </div>
            </div>

            <!-- Social Logins -->
            <div class="space-y-3">
                <button class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-gray-300 rounded-xl font-medium text-slate-700 hover:bg-gray-50 transition shadow-sm">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/><path d="M1 1h22v22H1z" fill="none"/></svg>
                    Continue with Google
                </button>
                <button class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-gray-300 rounded-xl font-medium text-slate-700 hover:bg-gray-50 transition shadow-sm">
                    <svg class="w-5 h-5 text-black fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.04 2.26-.7 3.59-.71 1.56.03 2.66.56 3.44 1.3-3.14 1.83-2.6 5.86.32 7.02-.75 1.91-1.6 3.73-2.43 4.56zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
                    Continue with Apple
                </button>
            </div>

            <div class="relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white text-gray-500 font-medium">Or continue with email</span>
                </div>
            </div>

            <!-- Email Form -->
            <form id="auth-form" class="space-y-4">
                <div id="name-field" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name or Studio Name</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input id="auth-name" type="text" placeholder="John Doe" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-slate-900 focus:border-slate-900 outline-none transition">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input id="auth-email" type="email" placeholder="you@example.com" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-slate-900 focus:border-slate-900 outline-none transition" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input id="auth-password" type="password" placeholder="••••••••" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-slate-900 focus:border-slate-900 outline-none transition" required>
                    </div>
                    <div id="forgot-password-link" class="mt-2 text-right">
                        <a href="forgot-password.html" class="text-sm font-medium text-blue-600 hover:underline">Forgot password?</a>
                    </div>
                </div>

                <p id="auth-status" class="hidden text-sm rounded-xl px-4 py-3 border"></p>

                <button id="auth-submit-btn" type="button" class="w-full bg-slate-900 text-white font-bold py-3.5 rounded-xl shadow-lg hover:bg-slate-800 transition flex items-center justify-center gap-2 mt-6">
                    <span id="submit-btn-text">Log In</span> <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>

            <!-- Toggle Auth State -->
            <div class="text-center text-sm font-medium text-gray-600">
                <span id="toggle-prompt">Don't have an account?</span> 
                <button id="toggle-auth-btn" class="text-slate-900 font-bold hover:underline ml-1">Sign up</button>
            </div>

        </div>
    </div>

        <script src="js/shared.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
