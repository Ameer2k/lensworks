<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Pros | LensWorks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/shared.css">
</head>
<body class="text-slate-900 font-sans min-h-screen flex flex-col bg-gray-50">
    <header class="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 md:px-12 py-3 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 cursor-pointer group">
                <i data-lucide="camera" class="w-7 h-7 text-slate-900 group-hover:text-blue-600 transition-colors"></i>
                <span class="text-xl font-bold tracking-tight">LensWorks</span>
            </a>

            <nav class="hidden md:flex items-center gap-8 font-medium text-sm text-gray-500">
                <a href="directory.html" class="hover:text-slate-900 transition">Explore</a>
                <a href="saved-pros.html" class="text-slate-900 font-semibold relative after:absolute after:bottom-[-16px] after:left-0 after:w-full after:h-0.5 after:bg-slate-900">Saved Pros</a>
                <a href="client-dashboard.html" class="hover:text-slate-900 transition">My Dashboard</a>
            </nav>

            <div class="flex items-center gap-4">
                <a href="directory.html" class="px-4 py-2 rounded-lg border border-gray-200 text-sm font-semibold text-slate-700 hover:bg-gray-50 transition">Back to Directory</a>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto px-6 md:px-12 py-8 w-full">
        <div class="mb-8 flex flex-col md:flex-row md:items-end md:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-slate-900">Saved Pros</h1>
                <p class="text-sm text-gray-500 mt-1.5">Your favorited photographers and studios in one place.</p>
            </div>
            <p id="saved-pros-count" class="text-sm font-semibold text-slate-600">0 saved</p>
        </div>

        <div id="saved-pros-status" class="hidden mb-6 rounded-xl border px-4 py-3 text-sm font-medium"></div>

        <div id="saved-pros-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            <div class="bg-white border border-dashed border-gray-300 rounded-2xl p-10 text-center text-sm text-gray-500">Loading saved pros...</div>
        </div>
    </main>

    <footer class="bg-slate-900 text-white pt-10 pb-8 px-6 md:px-12 border-t border-slate-800">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 text-xs text-gray-400">
            <div class="flex items-center gap-2">
                <i data-lucide="camera" class="w-5 h-5 text-gray-500"></i>
                <span class="font-bold text-gray-300 text-sm tracking-tight">LensWorks</span>
            </div>
            <p>© 2026 LensWorks Platform. All rights reserved.</p>
            <div class="flex gap-6 font-medium">
                <a href="help.html" class="hover:text-white transition">Help Center</a>
                <a href="privacy.html" class="hover:text-white transition">Privacy</a>
                <a href="terms.html" class="hover:text-white transition">Terms</a>
            </div>
        </div>
    </footer>

    <script src="js/shared.js"></script>
    <script src="js/saved-pros.js"></script>
</body>
</html>
